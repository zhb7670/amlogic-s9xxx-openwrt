name: 🔄 Kernel Monitor & Auto Build

on:
  schedule:
    # 每天凌晨0点检查一次 (GitHub Actions 云端运行，不依赖本地电脑)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 也可以手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 检查 6.12.y 内核
      # ============================================
      - name: Get latest 6.12.y kernel version
        id: kernel_612
        run: |
          echo "检查 6.12.y 内核..."
          LATEST=$(curl -s https://api.github.com/repos/ophub/kernel/releases/tags/kernel_stable \
            | grep -o '"name": "[^"]*6\.12\.[^"]*\.tar\.gz"' \
            | sed 's/"name": "//;s/\.tar\.gz"//' | sed 's/"//g' \
            | grep -E "^6\.12\." | sort -V | tail -1)
          echo "Latest 6.12.y: $LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Read last known 6.12.y version
        id: last_612
        run: |
          LAST=$(cat .kernel_version_6.12 2>/dev/null || echo "")
          echo "Last known 6.12.y: $LAST"
          echo "known=$LAST" >> $GITHUB_OUTPUT

      - name: Compare 6.12.y versions
        id: compare_612
        run: |
          if [ "${{ steps.kernel_612.outputs.latest }}" != "${{ steps.last_612.outputs.known }}" ]; then
            echo "🆕 6.12.y 新内核: ${{ steps.kernel_612.outputs.latest }}"
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 6.12.y 无更新"
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Save 6.12.y version
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "${{ steps.kernel_612.outputs.latest }}" > .kernel_version_6.12
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .kernel_version_6.12
          git commit -m "Update 6.12.y kernel to ${{ steps.kernel_612.outputs.latest }}"
          git push

      # ============================================
      # 检查 6.18.y 内核
      # ============================================
      - name: Get latest 6.18.y kernel version
        id: kernel_618
        run: |
          echo "检查 6.18.y 内核..."
          LATEST=$(curl -s https://api.github.com/repos/ophub/kernel/releases/tags/kernel_stable \
            | grep -o '"name": "[^"]*6\.18\.[^"]*\.tar\.gz"' \
            | sed 's/"name": "//;s/\.tar\.gz"//' | sed 's/"//g' \
            | grep -E "^6\.18\." | sort -V | tail -1)
          echo "Latest 6.18.y: $LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Read last known 6.18.y version
        id: last_618
        run: |
          LAST=$(cat .kernel_version_6.18 2>/dev/null || echo "")
          echo "Last known 6.18.y: $LAST"
          echo "known=$LAST" >> $GITHUB_OUTPUT

      - name: Compare 6.18.y versions
        id: compare_618
        run: |
          if [ "${{ steps.kernel_618.outputs.latest }}" != "${{ steps.last_618.outputs.known }}" ]; then
            echo "🆕 6.18.y 新内核: ${{ steps.kernel_618.outputs.latest }}"
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 6.18.y 无更新"
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Save 6.18.y version
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "${{ steps.kernel_618.outputs.latest }}" > .kernel_version_6.18
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .kernel_version_6.18
          git commit -m "Update 6.18.y kernel to ${{ steps.kernel_618.outputs.latest }}"
          git push

      # ============================================
      # 触发编译 - 6.12.y 内核 (全部设备)
      # ============================================
      - name: 🏗️ Build 6.12.y Amlogic devices
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 s905/s905x2/s905x3/s905d/s912/s922x/s922x-n2 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905x3 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905d -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905x2 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s922x -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s922x-n2 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s912 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.12.y AllWinner/Rockchip vplus
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 vplus/beikeyun/l1pro 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=vplus -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=beikeyun -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=l1pro -f openwrt_kernel=6.12.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.12.y RK3566/8 devices
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 r66s/r68s/rock5b/rock5c 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=r66s -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=r68s -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=rock5b -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=rock5c -f openwrt_kernel=6.12.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.12.y RK3566/8 e-series
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 e20c/e24c/e25 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e20c -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e24c -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e25 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e52c -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e54c -f openwrt_kernel=6.12.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.12.y RK3528 devices
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 h28k/h66k/h68k/h69k 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h28k -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h66k -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h68k -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h69k -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h69k-max -f openwrt_kernel=6.12.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.12.y RK3588 devices
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 h88k/jp-tvbox/photonicat 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h88k -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h88k-v3 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=jp-tvbox -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=photonicat -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=watermelon-pi -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=yixun-rs6pro -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=zcube1-max -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=100ask-dshanpi-a1 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=ak88 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=cm3 -f openwrt_kernel=6.12.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.12.y RK3399
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 rk3399 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=rk3399 -f openwrt_kernel=6.12.y -f customize_rk3399=tvi3315a:rk3399-tvi3315a.dtb/sw799:rk3399-bozz-sw799.dtb --repo ${{ github.repository }}

      # ============================================
      # 触发编译 - 6.18.y 内核 (全部设备)
      # ============================================
      - name: 🏗️ Build 6.18.y Amlogic devices
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 s905/s905x2/s905x3/s905d/s912/s922x/s922x-n2 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905x3 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905d -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905x2 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s922x -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s922x-n2 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s912 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=s905 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.18.y AllWinner/Rockchip vplus
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 vplus/beikeyun/l1pro 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=vplus -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=beikeyun -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=l1pro -f openwrt_kernel=6.18.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.18.y RK3566/8 devices
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 r66s/r68s/rock5b/rock5c 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=r66s -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=r68s -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=rock5b -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=rock5c -f openwrt_kernel=6.18.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.18.y RK3566/8 e-series
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 e20c/e24c/e25 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e20c -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e24c -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e25 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e52c -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=e54c -f openwrt_kernel=6.18.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.18.y RK3528 devices
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 h28k/h66k/h68k/h69k 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h28k -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h66k -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h68k -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h69k -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h69k-max -f openwrt_kernel=6.18.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.18.y RK3588 devices
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 h88k/jp-tvbox/photonicat 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h88k -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=h88k-v3 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=jp-tvbox -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=photonicat -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=watermelon-pi -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=yixun-rs6pro -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=zcube1-max -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=100ask-dshanpi-a1 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=ak88 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=cm3 -f openwrt_kernel=6.18.y --repo ${{ github.repository }}

      - name: 🏗️ Build 6.18.y RK3399
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 rk3399 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" -f openwrt_soc=rk3399 -f openwrt_kernel=6.18.y -f customize_rk3399=tvi3315a:rk3399-tvi3315a.dtb/sw799:rk3399-bozz-sw799.dtb --repo ${{ github.repository }}

      # ============================================
      # 汇总报告
      # ============================================
      - name: 📊 Build Report
        run: |
          echo "=========================================="
          echo "   🔄 内核监控 & 全设备编译报告"
          echo "=========================================="
          echo "📦 内核版本:"
          echo "   6.12.y: ${{ steps.kernel_612.outputs.latest }}"
          echo "   6.18.y: ${{ steps.kernel_618.outputs.latest }}"
          echo ""
          echo "🏗️ 编译任务:"
          if [ "${{ steps.compare_612.outputs.trigger }}" == "true" ]; then
            echo "   ✅ 6.12.y: 全部34个设备"
          fi
          if [ "${{ steps.compare_618.outputs.trigger }}" == "true" ]; then
            echo "   ✅ 6.18.y: 全部34个设备"
          fi
          if [ "${{ steps.compare_612.outputs.trigger }}" == "false" ] && [ "${{ steps.compare_618.outputs.trigger }}" == "false" ]; then
            echo "   ✅ 无新内核版本，无需编译"
          fi
          echo "=========================================="
