name: 🔄 Kernel Monitor & Auto Build

on:
  schedule:
    # 每6小时检查一次 (GitHub Actions 云端运行，不依赖本地电脑)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # 也可以手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 检查 6.12.y 内核
      # ============================================
      - name: Get latest 6.12.y kernel version
        id: kernel_612
        run: |
          echo "检查 6.12.y 内核..."
          LATEST=$(curl -s https://api.github.com/repos/ophub/kernel/releases/tags/kernel_stable \
            | grep -o '"name": "[^"]*6\.12\.[^"]*\.tar\.gz"' \
            | sed 's/"name": "//;s/\.tar\.gz"//' | sed 's/"//g' \
            | grep -E "^6\.12\." | sort -V | tail -1)
          echo "Latest 6.12.y: $LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Read last known 6.12.y version
        id: last_612
        run: |
          LAST=$(cat .kernel_version_6.12 2>/dev/null || echo "")
          echo "Last known 6.12.y: $LAST"
          echo "known=$LAST" >> $GITHUB_OUTPUT

      - name: Compare 6.12.y versions
        id: compare_612
        run: |
          if [ "${{ steps.kernel_612.outputs.latest }}" != "${{ steps.last_612.outputs.known }}" ]; then
            echo "🆕 6.12.y 新内核: ${{ steps.kernel_612.outputs.latest }}"
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 6.12.y 无更新"
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Save 6.12.y version
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "${{ steps.kernel_612.outputs.latest }}" > .kernel_version_6.12
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .kernel_version_6.12
          git commit -m "Update 6.12.y kernel to ${{ steps.kernel_612.outputs.latest }}"
          git push

      # ============================================
      # 检查 6.18.y 内核
      # ============================================
      - name: Get latest 6.18.y kernel version
        id: kernel_618
        run: |
          echo "检查 6.18.y 内核..."
          LATEST=$(curl -s https://api.github.com/repos/ophub/kernel/releases/tags/kernel_stable \
            | grep -o '"name": "[^"]*6\.18\.[^"]*\.tar\.gz"' \
            | sed 's/"name": "//;s/\.tar\.gz"//' | sed 's/"//g' \
            | grep -E "^6\.18\." | sort -V | tail -1)
          echo "Latest 6.18.y: $LATEST"
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Read last known 6.18.y version
        id: last_618
        run: |
          LAST=$(cat .kernel_version_6.18 2>/dev/null || echo "")
          echo "Last known 6.18.y: $LAST"
          echo "known=$LAST" >> $GITHUB_OUTPUT

      - name: Compare 6.18.y versions
        id: compare_618
        run: |
          if [ "${{ steps.kernel_618.outputs.latest }}" != "${{ steps.last_618.outputs.known }}" ]; then
            echo "🆕 6.18.y 新内核: ${{ steps.kernel_618.outputs.latest }}"
            echo "trigger=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 6.18.y 无更新"
            echo "trigger=false" >> $GITHUB_OUTPUT
          fi

      - name: Save 6.18.y version
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "${{ steps.kernel_618.outputs.latest }}" > .kernel_version_6.18
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .kernel_version_6.18
          git commit -m "Update 6.18.y kernel to ${{ steps.kernel_618.outputs.latest }}"
          git push

      # ============================================
      # 触发编译 - 6.12.y 内核 (4个设备)
      # ============================================
      - name: 🏗️ Build s905d-N1 6.12.y
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 s905d 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=s905d \
            -f openwrt_kernel=6.12.y \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build s905x2-X96Max 6.12.y
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 s905x2 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=s905x2 \
            -f openwrt_kernel=6.12.y \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build s905x3-X96Max+ 6.12.y
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 s905x3 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=s905x3 \
            -f openwrt_kernel=6.12.y \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build rk3399-sw799 6.12.y
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 rk3399-sw799 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=rk3399 \
            -f openwrt_kernel=6.12.y \
            -f customize_rk3399=sw799 \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build rk3399-tvi3315a 6.12.y
        if: steps.compare_612.outputs.trigger == 'true'
        run: |
          echo "触发 rk3399-tvi3315a 6.12.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=rk3399 \
            -f openwrt_kernel=6.12.y \
            -f customize_rk3399=tvi3315a \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      # ============================================
      # 触发编译 - 6.18.y 内核 (4个设备)
      # ============================================
      - name: 🏗️ Build s905d-N1 6.18.y
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 s905d 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=s905d \
            -f openwrt_kernel=6.18.y \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build s905x2-X96Max 6.18.y
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 s905x2 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=s905x2 \
            -f openwrt_kernel=6.18.y \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build s905x3-X96Max+ 6.18.y
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 s905x3 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=s905x3 \
            -f openwrt_kernel=6.18.y \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build rk3399-sw799 6.18.y
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 rk3399-sw799 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=rk3399 \
            -f openwrt_kernel=6.18.y \
            -f customize_rk3399=sw799 \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      - name: 🏗️ Build rk3399-tvi3315a 6.18.y
        if: steps.compare_618.outputs.trigger == 'true'
        run: |
          echo "触发 rk3399-tvi3315a 6.18.y 编译..."
          gh workflow run "Build OpenWrt using Unifreq scripts" \
            -f openwrt_soc=rk3399 \
            -f openwrt_kernel=6.18.y \
            -f customize_rk3399=tvi3315a \
            -f openwrt_repo=zhb7670/amlogic-s9xxx-openwrt \
            --repo ${{ github.repository }}

      # ============================================
      # 汇总报告
      # ============================================
      - name: 📊 Build Report
        run: |
          echo "=========================================="
          echo "   🔄 内核监控 & 编译报告"
          echo "=========================================="
          echo "📦 内核版本:"
          echo "   6.12.y: ${{ steps.kernel_612.outputs.latest }}"
          echo "   6.18.y: ${{ steps.kernel_618.outputs.latest }}"
          echo ""
          echo "🏗️ 编译任务:"
          if [ "${{ steps.compare_612.outputs.trigger }}" == "true" ]; then
            echo "   ✅ 6.12.y: s905d-N1, s905x2-X96Max, s905x3-X96Max+, rk3399-sw799, rk3399-tvi3315a"
          fi
          if [ "${{ steps.compare_618.outputs.trigger }}" == "true" ]; then
            echo "   ✅ 6.18.y: s905d-N1, s905x2-X96Max, s905x3-X96Max+, rk3399-sw799, rk3399-tvi3315a"
          fi
          if [ "${{ steps.compare_612.outputs.trigger }}" == "false" ] && [ "${{ steps.compare_618.outputs.trigger }}" == "false" ]; then
            echo "   ✅ 无新内核版本，无需编译"
          fi
          echo "=========================================="
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
